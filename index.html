<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Randomizador de Personajes - D&D</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="CSS/index-style.css">
    <link rel="icon" href="IMG/icon.png">
    <script src="java.js" defer></script>
</head>
<body>

<div id="toast-container"></div>

<div class="container">
    <h1>D&D Character Randomizer</h1>
    
    <div class="form-group">
        <label for="level-select">Nivel del personaje:</label>
        <select id="level-select">
            <script>
                for (let i = 1; i <= 20; i++) {
                    document.write(`<option value="${i}">Nivel ${i}</option>`);
                }
            </script>
        </select>
    </div>

    <button id="generate-btn" disabled>Generar Personaje</button>

    <div class="result-box" id="result-box">
        <div class="result-item">
            <span class="label-result">Nivel</span>
            <span class="value-result" id="res-level">-</span>
        </div>
        <div class="result-item">
            <span class="label-result">Raza</span>
            <span class="value-result" id="res-race">-</span>
        </div>
        <div class="result-item" id="container-subrace">
            <span class="label-result">Subraza</span>
            <span class="value-result" id="res-subrace">-</span>
        </div>
        <div class="result-item">
            <span class="label-result">Clase</span>
            <span class="value-result" id="res-class">-</span>
        </div>
        <div class="result-item" id="container-subclass">
            <span class="label-result">Subclase</span>
            <span class="value-result" id="res-subclass">-</span>
        </div>
        <div class="result-item">
            <span class="label-result">Trasfondo</span>
            <span class="value-result" id="res-background">-</span>
        </div>
        
        <div class="stats-container" id="container-stats" style="display: none;">
            <div class="stat-block"><span>FUE</span><strong id="stat-fue">10</strong></div>
            <div class="stat-block"><span>DES</span><strong id="stat-des">10</strong></div>
            <div class="stat-block"><span>CON</span><strong id="stat-con">10</strong></div>
            <div class="stat-block"><span>INT</span><strong id="stat-int">10</strong></div>
            <div class="stat-block"><span>SAB</span><strong id="stat-sab">10</strong></div>
            <div class="stat-block"><span>CAR</span><strong id="stat-car">10</strong></div>
        </div>
    </div>

    <div class="native-books-container">
        <h3>📖 Manuales Disponibles</h3>
        <div id="native-books-grid" class="native-books-grid">
            </div>
    </div>

    <div class="form-group">
        <label class="custom-file-upload">
            <input type="file" id="csv-file" accept=".csv" multiple>
            <span>📂 Cargar Libros (.csv)</span>
        </label>
    </div>

    <div class="file-list-container">
        <label>Libros activos en el pool:</label>
        <div id="loaded-files-list" class="chips-container">
            <span class="empty-list-msg">Ningún libro cargado todavía.</span>
        </div>
    </div>
    
    <button id="clear-btn" class="btn-secondary" style="margin-top: 10px; background-color: #333; font-size: 0.9rem; padding: 8px;">Limpiar Base de Datos</button>
</div>

<footer class="main-footer">
    <div class="footer-content">
        <div class="footer-links">
            <a href="HTML/faq.html">Preguntas Frecuentes (FAQ)</a>
            <a href="HTML/documentacion.html">Documentación</a>
            <a href="https://github.com/Coty1904/D-D-Character-Randomizer" target="_blank" rel="noopener noreferrer">🐱 GitHub</a>
        </div>
    </div>
</footer>

</body>
</html>
